# Resilience4j Circuit Breaker Configuration

# 1. Sliding Window: How many calls to record to calculate failure rate?
# We set this to 10 (instead of default 100) so you can trigger it quickly.
resilience4j.circuitbreaker.instances.backendA.slidingWindowSize=10

# 2. Failure Threshold: If 50% of those 10 calls fail, OPEN the circuit.
resilience4j.circuitbreaker.instances.backendA.failureRateThreshold=50

# 3. Open State Duration: How long to wait before trying again?
# We set this to 10s (instead of default 60s) so you don't have to wait long.
resilience4j.circuitbreaker.instances.backendA.waitDurationInOpenState=10s

# 4. Half-Open: How many "test" calls to allow when checking if backend is back up?
# This is the "Slow Open". It allows 3 calls to pass. If they work, it closes fully.
resilience4j.circuitbreaker.instances.backendA.permittedNumberOfCallsInHalfOpenState=3

# H2 Console Configuration
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb

# Flyway schema migrations (versioned, repeatable) - replaces schema.sql/data.sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.sql.init.mode=never

# Observability & Monitoring
# Expose health and prometheus endpoints
management.endpoints.web.exposure.include=health,prometheus
# Set application name for monitoring
spring.application.name=gemini-demo
# Add trace and span IDs to logs for correlation
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %m%n
# Sample all traces for development
management.tracing.sampling.probability=1.0
# Ensure trace context propagates into async threads
spring.sleuth.async.enabled=true
# Disable exemplars if Prometheus version doesn’t support them
management.metrics.export.prometheus.exemplars.enabled=false

# Two-tier caching (L1 = Caffeine, L2 = Redis)
# Set to true to enable Redis as a second-level cache.
app.cache.redis.enabled=false
spring.redis.host=localhost
spring.redis.port=6379